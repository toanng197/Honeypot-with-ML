name: PR Checks

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  lint-and-test:
    name: Lint & Dependency Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black pip-check-reqs ruff

      - name: Ruff lint & security check
        id: ruff
        continue-on-error: true
        run: |
          ruff check src/ --output-format=grouped | tee "$RUNNER_TEMP/ruff-report.txt"
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Comment Ruff findings on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          RUFF_REPORT_PATH: ${{ runner.temp }}/ruff-report.txt
          EXIT_CODE: ${{ steps.ruff.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ruff-report -->';
            const reportPath = process.env.RUFF_REPORT_PATH;
            const exitCode = process.env.EXIT_CODE;
            const hasFailed = exitCode !== '0';

            let body;
            if (hasFailed) {
              const report = fs.readFileSync(reportPath, 'utf8').trim();
              body = `${marker}
            ### Ruff — lint & security issues

            The following issues were found by Ruff (includes linting rules and security checks via \`S\` / Bandit rules).

            <details>
            <summary>View full report</summary>

            \`\`\`
            ${report.slice(0, 60000)}
            \`\`\`

            </details>

            **To fix auto-fixable issues locally:**
            \`\`\`sh
            ruff check --fix --unsafe-fixes src/
            \`\`\`
            Then address any remaining \`S\` (security) findings manually.`;
            } else {
              body = `${marker}
            ### Ruff — lint & security issues

            No issues found.`;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail Ruff check
        if: steps.ruff.outputs.exit_code != '0'
        run: exit 1

      - name: Black format check
        run: black --check src/

      - name: Check for unused requirements
        run: |
          pip-missing-reqs src/
          pip-extra-reqs src/

  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t krawl:test .
