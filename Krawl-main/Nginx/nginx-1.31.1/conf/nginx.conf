#user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    underscores_in_headers on; 

    # 1. Định nghĩa bộ lọc chuẩn hóa giá trị trống thành dấu "-"
    map $request_method      $clean_method      { "" "-"; default $request_method; }
    map $uri                 $clean_path        { "" "-"; default $uri; }
    map $query_string        $clean_query       { "" "-"; default $query_string; }
    map $http_host           $clean_host        { "" "-"; default $http_host; }
    map $http_user_agent     $clean_user_agent  { "" "-"; default $http_user_agent; }
    map $http_accept         $clean_accept      { "" "-"; default $http_accept; }
    map $http_accept_encoding $clean_accept_en   { "" "-"; default $http_accept_encoding; }
    map $http_accept_language $clean_accept_lar  { "" "-"; default $http_accept_language; }
    map $http_cookie         $clean_cookie      { "" "-"; default $http_cookie; }
    map $http_content_type   $clean_content_ty  { "" "-"; default $http_content_type; }
    map $http_content_length $clean_content_le  { "" "-"; default $http_content_length; }
    map $request_body        $clean_body        { "" "-"; default $request_body; }

    # 2. Định dạng log MỚI (chỉ chứa CHÍNH XÁC các dòng bạn muốn)
    log_format strict_ml_format escape=none '--- RAW REQUEST START ---\n'
                            'method:$clean_method\n'
                            'path:$clean_path\n'
                            'query:$clean_query\n'
                            'host:$clean_host\n'
                            'user_agent:$clean_user_agent\n'
                            'accept:$clean_accept\n'
                            'accept_en:$clean_accept_en\n'
                            'accept_lar:$clean_accept_lar\n'
                            'cookie:$clean_cookie\n'
                            'content_ty:$clean_content_ty\n'
                            'content_le:$clean_content_le\n'
                            'body:$clean_body\n'
                            '--- RAW REQUEST END ---\n';

    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen       80;
        server_name  localhost;

        location / {
            # Kích hoạt log mới tại đây
            access_log logs/access.log strict_ml_format;

            proxy_pass http://127.0.0.1:5000;

            # Giữ nguyên chuyển tiếp sang backend nhưng không ghi đè vào log Nginx
            proxy_pass_request_headers on;
            proxy_pass_request_body on;
            
            proxy_set_header Host $http_host; 
            proxy_set_header Connection $http_connection; 

            client_max_body_size 0; 
            client_body_buffer_size 128k; 
            proxy_buffers 16 16k;
            proxy_buffer_size 32k;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}